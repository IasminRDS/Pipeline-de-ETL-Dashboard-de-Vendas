    <text x="40" y="104" font-size="11" fill="#64748b">Receita total</text>
    <text x="40" y="130" font-size="20" font-weight="bold" fill="#0f172a">R$ 1.4M</text>
  </g>
  <g>
    <rect x="194" y="78" width="158" height="72" rx="12" fill="#fff"/>
    <rect x="194" y="78" width="4" height="72" rx="2" fill="#2563eb"/>
