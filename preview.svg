    <text x="550" y="130" font-size="20" font-weight="bold" fill="#0f172a">R$ 5k</text>
  </g>

  <!-- Painel: receita por mês -->
  <rect x="24" y="166" width="330" height="250" rx="12" fill="#fff"/>
  <text x="44" y="194" font-size="14" font-weight="bold" fill="#334155">Receita por mês</text>
  <g fill="#2563eb">
    <rect x="50" y="320" width="18" height="70" rx="3"/>
    <rect x="74" y="290" width="18" height="100" rx="3"/>
    <rect x="98" y="330" width="18" height="60" rx="3"/>
    <rect x="122" y="310" width="18" height="80" rx="3"/>
    <rect x="146" y="340" width="18" height="50" rx="3"/>
    <rect x="170" y="300" width="18" height="90" rx="3"/>
    <rect x="194" y="285" width="18" height="105" rx="3"/>
    <rect x="218" y="345" width="18" height="45" rx="3"/>
    <rect x="242" y="360" width="18" height="30" rx="3"/>
    <rect x="266" y="295" width="18" height="95" rx="3"/>
    <rect x="290" y="278" width="18" height="112" rx="3"/>
    <rect x="314" y="308" width="18" height="82" rx="3"/>
  </g>

  <!-- Painel: top produtos -->
  <rect x="366" y="166" width="330" height="250" rx="12" fill="#fff"/>
  <text x="386" y="194" font-size="14" font-weight="bold" fill="#334155">Top 5 produtos</text>
