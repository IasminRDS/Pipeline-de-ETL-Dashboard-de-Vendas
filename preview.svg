  <text x="24" y="60" font-size="12" fill="#64748b">Gerado automaticamente pelo pipeline de dados · fonte: vendas.db</text>

  <!-- KPIs -->
  <g>
    <rect x="24" y="78" width="158" height="72" rx="12" fill="#fff"/>
